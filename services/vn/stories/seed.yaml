        video_ref: "placeholder"
        text: "You stand at the threshold. Two paths diverge."
        choices:
          - label: "Take the left path"
            target: "left"
          - label: "Take the right path"
            target: "right"
      left:
        video_ref: "placeholder"
        text: "The left path leads to a clearing."
        next_node: "ending"
      right:
        video_ref: "placeholder"
        text: "The right path winds through shadow."
        next_node: "ending"
      ending:
        video_ref: "placeholder"
        text: "Both paths converge. The prologue ends."
        is_end: true
