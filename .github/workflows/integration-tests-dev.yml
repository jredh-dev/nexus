name: Integration Tests (DEV)

# Run integration tests against deployed Cloud Run dev services.
# Triggers:
#   - After ANY deploy-dev workflow completes successfully
#   - Manual dispatch for ad-hoc verification
#
# Includes a polling step that waits for the new Cloud Run revision
# to be serving before running tests.

on:
  workflow_run:
    workflows:
      - "Deploy Hermit to Cloud Run (DEV)"
      - "Deploy go-http to Cloud Run (DEV)"
      - "Deploy Cal to Cloud Run (DEV)"
      - "Deploy Portal to Cloud Run (DEV)"
      - "Deploy Web Frontend to Cloud Run (DEV)"
      # vn is currently disabled — add here when re-enabled:
      # - "Deploy vn to Cloud Run (DEV)"
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

env:
  GCP_PROJECT_ID: dea-noctua
  GCP_REGION: us-central1

jobs:
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    # Only run if the triggering workflow succeeded (or manual dispatch)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Wait for new revision to be serving
        run: |
          # After a deploy, Cloud Run may take a few seconds to route
          # traffic to the new revision. Poll health endpoints until
          # they respond, with a 5-minute timeout.
          SERVICES=(
            "nexus-hermit-dev"
            "nexus-secrets-dev"
            "nexus-portal-dev"
            "nexus-web-dev"
            "nexus-cal-dev"
          )

          echo "Waiting for Cloud Run services to be ready..."
          for SVC in "${SERVICES[@]}"; do
            URL=$(gcloud run services describe "$SVC" \
              --region ${{ env.GCP_REGION }} \
              --format 'value(status.url)' 2>/dev/null) || continue

            # Skip services that don't exist yet
            if [ -z "$URL" ]; then
              echo "  $SVC: not found, skipping"
              continue
            fi

            echo -n "  $SVC: polling $URL "
            for i in $(seq 1 30); do
              # Use /health if available, fall back to root
              HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "$URL/health" 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo " ready (attempt $i)"
                break
              fi
              # Try root path for services without /health
              HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "$URL/" 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo " ready (attempt $i)"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo " timeout after 5 minutes (HTTP $HTTP_CODE)"
              fi
              sleep 10
            done
          done

      - name: Get service URLs and IAM token
        id: services
        run: |
          # Get hermit gRPC URL (strip https:// prefix, add :443 for gRPC)
          HERMIT_URL=$(gcloud run services describe nexus-hermit-dev \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          HERMIT_HOST=$(echo "$HERMIT_URL" | sed 's|https://||')
          echo "hermit_addr=${HERMIT_HOST}:443" >> $GITHUB_OUTPUT

          # Get secrets HTTP URL
          SECRETS_URL=$(gcloud run services describe nexus-secrets-dev \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "secrets_url=${SECRETS_URL}" >> $GITHUB_OUTPUT

          # Get IAM identity token for Cloud Run auth
          TOKEN=$(gcloud auth print-identity-token \
            --audiences="$HERMIT_URL" \
            --impersonate-service-account=${{ secrets.WIF_SERVICE_ACCOUNT }})
          echo "::add-mask::$TOKEN"
          echo "bearer_token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Get hermit secret from Secret Manager
        id: hermit-secret
        run: |
          SECRET=$(gcloud secrets versions access latest \
            --secret=hermit-secret-dev \
            --project=${{ env.GCP_PROJECT_ID }})
          echo "::add-mask::$SECRET"
          echo "value=$SECRET" >> $GITHUB_OUTPUT

      - name: Run integration tests
        env:
          HERMIT_ADDR: ${{ steps.services.outputs.hermit_addr }}
          HERMIT_SECRET: ${{ steps.hermit-secret.outputs.value }}
          HERMIT_BEARER_TOKEN: ${{ steps.services.outputs.bearer_token }}
          SECRETS_URL: ${{ steps.services.outputs.secrets_url }}
        run: |
          echo "Testing hermit at: $HERMIT_ADDR"
          echo "Testing secrets at: $SECRETS_URL"
          go test -tags integration -v -count=1 -timeout 120s ./tests/integration/...

      - name: Summary
        if: always()
        run: |
          echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Hermit**: nexus-hermit-dev" >> $GITHUB_STEP_SUMMARY
          echo "- **Secrets**: nexus-secrets-dev" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "- **Source workflow**: ${{ github.event.workflow_run.name }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Source conclusion**: ${{ github.event.workflow_run.conclusion }}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
          SOURCE_WORKFLOW: ${{ github.event.workflow_run.name || 'manual' }}
        run: |
          COLOR=$([[ "$STATUS" == "success" ]] && echo "3066993" || echo "15158332")
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"Test: integration\",
                \"description\": \"Cloud Run DEV (triggered by: $SOURCE_WORKFLOW)\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"Environment\", \"value\": \"\`dev\`\", \"inline\": true},
                  {\"name\": \"Status\", \"value\": \"$STATUS\", \"inline\": true}
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"
