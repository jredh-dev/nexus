name: Promote rc to main

# Triggers when Gitea pushes Gitea's main branch to the GitHub `rc` branch.
# Runs full CI. On pass: fast-forward merges rc → main, then opens a PR
# from main → current versioned RC branch (rc/vX.Y.Z).
on:
  push:
    branches: [rc]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Check gofmt
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not gofmt-clean:"
            gofmt -s -l .
            exit 1
          fi
      - run: go vet ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - run: go build ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - run: go test -race ./...

  promote:
    name: Merge rc → main and open RC PR
    runs-on: ubuntu-latest
    needs: [lint, build, test]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rc
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fast-forward merge rc → main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git merge --ff-only origin/rc
          git push origin main

      - name: Determine current versioned RC branch
        id: rc
        run: |
          rc=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/branches?per_page=100" \
            | grep '"name"' \
            | grep '"rc/v' \
            | sed 's/.*"name": "\(.*\)".*/\1/' \
            | sort -rV \
            | head -1)
          echo "rc_branch=${rc}" >> $GITHUB_OUTPUT
          echo "Using versioned RC branch: ${rc}"

      - name: Open PR main → versioned RC
        if: steps.rc.outputs.rc_branch != ''
        run: |
          rc_branch="${{ steps.rc.outputs.rc_branch }}"
          title=$(git log -1 --format="%s" origin/main)

          http_code=$(curl -s -o /tmp/pr.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls" \
            -d "{
              \"title\": \"${title}\",
              \"head\": \"main\",
              \"base\": \"${rc_branch}\",
              \"body\": \"Promoted from Gitea via \`rc\` branch. SHA: \`${{ github.sha }}\`\"
            }")

          if [ "$http_code" = "422" ]; then
            echo "PR already exists"
          elif [ "$http_code" != "201" ]; then
            echo "PR creation failed (HTTP ${http_code}):"
            cat /tmp/pr.json
            exit 1
          else
            grep '"html_url"' /tmp/pr.json | head -1
          fi
