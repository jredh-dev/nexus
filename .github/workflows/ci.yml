name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Check gofmt
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not gofmt-clean:"
            gofmt -s -l .
            echo "Run: gofmt -s -w ."
            exit 1
          fi

      - name: Run go fix
        run: |
          go fix ./...
          if [ -n "$(git diff --name-only)" ]; then
            echo "go fix produced changes — commit them first:"
            git diff --name-only
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build nexus server
        run: go build -v ./cmd/server

      - name: Build portal server
        run: go build -v ./services/portal/cmd/server

      - name: Build cal server
        run: CGO_ENABLED=1 go build -v ./services/cal/cmd/server

      - name: Build vn server
        run: go build -v ./services/vn/cmd/server

  build-web:
    name: Build Web Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: services/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: services/web

      - name: Build
        run: npm run build
        working-directory: services/web

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history to diff changed files against base branch.
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      # Detect which services changed and only test those packages.
      # Shared code changes (internal/, go-http/, go.mod) trigger full suite.
      # Pushes to main always run all tests.
      - name: Detect changed packages
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
            CHANGED=$(git diff --name-only "$BASE"...HEAD)
          else
            # Push to main — always run everything.
            echo "packages=./..." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$CHANGED" ]; then
            echo "packages=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Shared deps changed → test everything.
          if echo "$CHANGED" | grep -qE '^(internal/|services/go-http/|go\.(mod|sum)$)'; then
            echo "packages=./..." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Map changed directories to test package globs.
          PKGS=""
          for svc in cmd/tui cmd/server cmd/servicectl services/cal services/portal services/secrets services/vn services/discord-monitor; do
            if echo "$CHANGED" | grep -q "^${svc}/"; then
              PKGS="$PKGS ./${svc}/..."
            fi
          done

          # Go files changed outside known prefixes → run all as safety net.
          if [ -z "$PKGS" ] && echo "$CHANGED" | grep -qE '\.go$'; then
            PKGS="./..."
          fi

          echo "packages=${PKGS}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        if: steps.changes.outputs.packages != ''
        run: |
          echo "Testing: ${{ steps.changes.outputs.packages }}"
          go test -v -race -coverprofile=coverage.out -covermode=atomic ${{ steps.changes.outputs.packages }}

      - name: Upload coverage
        if: steps.changes.outputs.packages != ''
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-nexus
          token: ${{ secrets.CODECOV_TOKEN }}
        # Don't fail the build if Codecov upload fails
        continue-on-error: true

  # Notify Discord on CI failure (main branch only).
  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [lint, build, build-web, test]
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"CI Failed: nexus\",
                \"description\": \"Push to main\",
                \"color\": 15158332,
                \"fields\": [
                  {\"name\": \"Branch\", \"value\": \"\`main\`\", \"inline\": true},
                  {\"name\": \"Commit\", \"value\": \"\`${GITHUB_SHA::7}\`\", \"inline\": true},
                  {\"name\": \"Status\", \"value\": \"failure\", \"inline\": true}
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"
