name: RC CI

on:
  pull_request:
    # Run for PRs targeting any RC branch (e.g. rc/v1.2.0, rc/v2.0.0).
    branches: ['rc/v*']

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Check gofmt
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not gofmt-clean:"
            gofmt -s -l .
            echo "Run: gofmt -s -w ."
            exit 1
          fi

      - name: Run go fix
        run: |
          go fix ./...
          if [ -n "$(git diff --name-only)" ]; then
            echo "go fix produced changes — commit them first:"
            git diff --name-only
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    # Run in parallel with lint — RC CI should be fast feedback, not gated.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build all packages
        run: go build ./...

      - name: Build nexus server
        run: go build -v ./cmd/server

      - name: Build portal server
        run: go build -v ./services/portal/cmd/server

      - name: Build cal server
        run: CGO_ENABLED=1 go build -v ./services/cal/cmd/server

      - name: Build vn server
        run: go build -v ./services/vn/cmd/server

  test:
    name: Test
    runs-on: ubuntu-latest
    # Run in parallel with lint — full test suite, always, for RC hygiene.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run tests (race detector)
        run: go test -v -race ./...

  build-web:
    name: Build Web Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: services/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: services/web

      - name: Build
        run: npm run build
        working-directory: services/web
