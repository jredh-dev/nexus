//
// vn — visual novel / visual narrative engine service.
//
// This proto defines the gRPC API for the vn backend. It owns:
//   1. PostgreSQL storage — videos (large objects), subtitles, events, readers, votes
//   2. Git-controlled YAML — story definitions with branch traversal
//   3. Story engine — chapter state machine, node traversal, hot-reload
//
// Clients include the mobile-first web client and potentially the TUI.

syntax = "proto3";

package vn.v1;

option go_package = "github.com/jredh-dev/nexus/gen/vn/v1;vnv1";

import "google/protobuf/timestamp.proto";

// ─────────────────────────────────────────────
// StarService — the unified API
// ─────────────────────────────────────────────

service StarService {
  // --- Story navigation ---

  // GetStory returns the current story metadata (title, chapters, start node).
  rpc GetStory(GetStoryRequest) returns (GetStoryResponse);

  // StartReading initializes or resumes a reader's position in the story.
  // Idempotent: calling again returns current position without resetting.
  rpc StartReading(StartReadingRequest) returns (StartReadingResponse);

  // Advance moves the reader forward — either linearly (next_node) or by
  // selecting a choice. Returns the new node and any chapter completion info.
  rpc Advance(AdvanceRequest) returns (AdvanceResponse);

  // ResetReader clears a reader's navigation state so they can restart.
  rpc ResetReader(ResetReaderRequest) returns (ResetReaderResponse);

  // --- Chapters ---

  // ListChapters returns all chapters in sort order.
  rpc ListChapters(ListChaptersRequest) returns (ListChaptersResponse);

  // GetChapter returns a single chapter with its nodes.
  rpc GetChapter(GetChapterRequest) returns (GetChapterResponse);

  // --- Voting ---

  // CastVote spends reader tokens on a chapter choice.
  rpc CastVote(CastVoteRequest) returns (CastVoteResponse);

  // GetVoteTallies returns vote totals for a chapter's choices.
  rpc GetVoteTallies(GetVoteTalliesRequest) returns (GetVoteTalliesResponse);

  // --- Reader ---

  // GetReader returns reader info (tokens, completed chapters, position).
  rpc GetReader(GetReaderRequest) returns (GetReaderResponse);

  // --- Video ---

  // GetVideoMeta returns metadata for a video (no binary data).
  rpc GetVideoMeta(GetVideoMetaRequest) returns (GetVideoMetaResponse);

  // ListVideos returns all video metadata.
  rpc ListVideos(ListVideosRequest) returns (ListVideosResponse);

  // StreamVideo streams video binary data. Use HTTP endpoint for range
  // requests; this RPC is for bulk transfer / pre-caching.
  rpc StreamVideo(StreamVideoRequest) returns (stream StreamVideoChunk);

  // --- Git story management ---

  // GetStoryVersion returns the current git commit of the story YAML repo.
  rpc GetStoryVersion(GetStoryVersionRequest) returns (GetStoryVersionResponse);

  // ListStoryCommits returns the commit log of the story repo.
  rpc ListStoryCommits(ListStoryCommitsRequest) returns (ListStoryCommitsResponse);

  // CheckoutStoryVersion moves the story to a specific git commit.
  // This triggers a hot-reload of the story engine.
  rpc CheckoutStoryVersion(CheckoutStoryVersionRequest) returns (CheckoutStoryVersionResponse);
}

// ─────────────────────────────────────────────
// Story navigation messages
// ─────────────────────────────────────────────

message GetStoryRequest {}

message GetStoryResponse {
  string title = 1;
  int32 version = 2;
  string description = 3;
  string start_node = 4;         // fully qualified: "chapter.node"
  repeated string chapters = 5;  // chapter IDs in sort order
}

message StartReadingRequest {
  // Device hash or reader identifier. Anonymous — no account required.
  string device_hash = 1;
}

message StartReadingResponse {
  ReaderState state = 1;
  StoryNode node = 2;
  ReaderInfo reader = 3;
}

message AdvanceRequest {
  string device_hash = 1;
  // For choice nodes: index of the selected choice (0-based).
  // For linear nodes (next_node): set to -1 or omit.
  int32 choice_index = 2;
}

message AdvanceResponse {
  ReaderState state = 1;
  StoryNode node = 2;
  // Set if a chapter was just completed by this transition.
  string completed_chapter = 3;
  // Tokens granted for completing the chapter (0 if none).
  int32 tokens_granted = 4;
  // Reader's new token balance after any grant.
  int32 token_balance = 5;
}

message ResetReaderRequest {
  string device_hash = 1;
}

message ResetReaderResponse {}

// ─────────────────────────────────────────────
// Chapter messages
// ─────────────────────────────────────────────

message ListChaptersRequest {}

message ListChaptersResponse {
  repeated ChapterSummary chapters = 1;
}

message ChapterSummary {
  string id = 1;
  string title = 2;
  string description = 3;
  int32 sort_order = 4;
  int32 token_reward = 5;
  int32 node_count = 6;
}

message GetChapterRequest {
  string chapter_id = 1;
}

message GetChapterResponse {
  string id = 1;
  string title = 2;
  string description = 3;
  int32 sort_order = 4;
  int32 token_reward = 5;
  string start_node = 6;
  // Node ID → StoryNode mapping.
  map<string, StoryNode> nodes = 7;
}

// ─────────────────────────────────────────────
// Voting messages
// ─────────────────────────────────────────────

message CastVoteRequest {
  string device_hash = 1;
  string chapter_id = 2;
  string choice = 3;
  int32 tokens_spent = 4;  // must be >= 1
}

message CastVoteResponse {
  string vote_id = 1;
  int32 remaining_tokens = 2;
}

message GetVoteTalliesRequest {
  string chapter_id = 1;
}

message GetVoteTalliesResponse {
  repeated VoteTally tallies = 1;
}

message VoteTally {
  string choice = 1;
  int64 total_tokens = 2;
  int32 vote_count = 3;
}

// ─────────────────────────────────────────────
// Reader messages
// ─────────────────────────────────────────────

message GetReaderRequest {
  string device_hash = 1;
}

message GetReaderResponse {
  ReaderInfo reader = 1;
  // Navigation state (if the reader has started).
  ReaderState state = 2;
}

// ─────────────────────────────────────────────
// Video messages
// ─────────────────────────────────────────────

message GetVideoMetaRequest {
  string video_id = 1;  // UUID
}

message GetVideoMetaResponse {
  VideoMeta video = 1;
}

message ListVideosRequest {}

message ListVideosResponse {
  repeated VideoMeta videos = 1;
}

message StreamVideoRequest {
  string video_id = 1;
}

// StreamVideoChunk is a chunk of binary video data sent as a server stream.
message StreamVideoChunk {
  bytes data = 1;
  // Total size of the video in bytes (sent in the first chunk).
  int64 total_bytes = 2;
  // MIME type (sent in the first chunk).
  string mime_type = 3;
}

// ─────────────────────────────────────────────
// Git story management messages
// ─────────────────────────────────────────────

message GetStoryVersionRequest {}

message GetStoryVersionResponse {
  string commit_hash = 1;
  string branch = 2;
  string message = 3;
  google.protobuf.Timestamp committed_at = 4;
}

message ListStoryCommitsRequest {
  // Max number of commits to return (default 20).
  int32 limit = 1;
}

message ListStoryCommitsResponse {
  repeated StoryCommit commits = 1;
}

message StoryCommit {
  string hash = 1;
  string message = 2;
  string author = 3;
  google.protobuf.Timestamp committed_at = 4;
}

message CheckoutStoryVersionRequest {
  // Git commit hash to checkout. The story engine will hot-reload.
  string commit_hash = 1;
}

message CheckoutStoryVersionResponse {
  // The story metadata after checkout.
  string title = 1;
  int32 version = 2;
  int32 chapter_count = 3;
}

// ─────────────────────────────────────────────
// Shared types
// ─────────────────────────────────────────────

// ReaderState tracks a reader's position in the story graph.
message ReaderState {
  string current_node = 1;         // fully qualified: "chapter.node"
  repeated string visited = 2;     // history of visited node IDs
  repeated string completed = 3;   // chapter IDs completed
}

// ReaderInfo is the persistent reader record from the database.
message ReaderInfo {
  string reader_id = 1;   // UUID
  string device_hash = 2;
  int32 tokens = 3;
  google.protobuf.Timestamp created_at = 4;
}

// StoryNode is a single scene in the story graph.
message StoryNode {
  string id = 1;           // fully qualified: "chapter.node"
  string video_ref = 2;    // reference to a video (name or UUID)
  string text = 3;         // narrative text overlay
  repeated NodeChoice choices = 4;
  string next_node = 5;    // for linear transitions (mutually exclusive with choices)
  bool is_end = 6;         // terminal node
  repeated SubtitleDef subtitles = 7;
}

// NodeChoice is a branching option at a choice point.
message NodeChoice {
  string label = 1;
  string target = 2;      // fully qualified or local ref
  int32 token_cost = 3;   // tokens required to vote for this choice
}

// SubtitleDef defines a text overlay with toggle-point visibility.
message SubtitleDef {
  string text = 1;
  bool initialize_visible = 2;
  bool end_visible = 3;
  repeated double timestamps_visible = 4;
  int32 sort_order = 5;
}

// VideoMeta is video metadata (no binary data).
message VideoMeta {
  string video_id = 1;    // UUID
  string name = 2;
  string codec = 3;
  string mime_type = 4;
  int32 duration_ms = 5;
  int32 width = 6;
  int32 height = 7;
  string loop_type = 8;   // "none", "palindrome", "loop"
  bool has_subtitles_already = 9;
  int64 size_bytes = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}
