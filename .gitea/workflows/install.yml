# Auto-install binaries on push to main.
# Detects which projects changed and only rebuilds those.
name: Install

on:
  push:
    branches: [main]

jobs:
  install:
    runs-on: local
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes and install
        env:
          OBF_PASSPHRASE: ${{ secrets.OBF_PASSPHRASE }}
          HERMIT_ADDR_PLAIN: ${{ secrets.HERMIT_ADDR_PLAIN }}
          HERMIT_SECRET_PLAIN: ${{ secrets.HERMIT_SECRET_PLAIN }}
          SECRETS_URL_PLAIN: ${{ secrets.SECRETS_URL_PLAIN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          CHANGED=$(git diff --name-only HEAD~1 HEAD)

          notify() {
            local service=$1 status=$2
            # Notify via discord-mcp HTTP API if available; fall back to direct webhook curl.
            if curl -sf http://discord-mcp:8092/health >/dev/null 2>&1; then
              curl -sf -X POST "http://discord-mcp:8092/mcp" \
                -H "Content-Type: application/json" \
                -d "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"tools/call\",\"params\":{\"name\":\"notify_discord\",\"arguments\":{\"event\":\"install\",\"service\":\"$service\",\"status\":\"$status\",\"env\":\"local\"}}}" \
                2>/dev/null || true
            elif [ -n "$DISCORD_WEBHOOK_URL" ]; then
              COLOR=$([ "$status" = "success" ] && echo "3066993" || echo "15158332")
              curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
                -H "Content-Type: application/json" \
                -d "{\"embeds\":[{\"title\":\"install $service\",\"description\":\"env: local | status: $status\",\"color\":$COLOR}]}" \
                2>/dev/null || true
            fi
          }

          # tui — Go TUI client (with obfuscated prod values if secrets are set)
          if echo "$CHANGED" | grep -qE '^(cmd/tui/|go\.(mod|sum)$)'; then
            if [ -n "$OBF_PASSPHRASE" ] && [ -n "$HERMIT_ADDR_PLAIN" ] && [ -n "$HERMIT_SECRET_PLAIN" ]; then
              echo "==> Installing tui (prod build with obf values)"
              if make install-prod \
                PASSPHRASE="$OBF_PASSPHRASE" \
                HERMIT_ADDR_PLAIN="$HERMIT_ADDR_PLAIN" \
                HERMIT_SECRET_PLAIN="$HERMIT_SECRET_PLAIN" \
                SECRETS_URL_PLAIN="$SECRETS_URL_PLAIN"; then
                notify tui success
              else
                notify tui failure
              fi
            else
              echo "==> Installing tui (dev build, no obf secrets)"
              if go install ./cmd/tui; then
                notify tui success
              else
                notify tui failure
              fi
            fi
          else
            echo "--- tui: no changes"
          fi

          # server — root server
          if echo "$CHANGED" | grep -qE '^(cmd/server/|internal/|go\.(mod|sum)$)'; then
            echo "==> Installing server"
            if go install ./cmd/server; then
              notify server success
            else
              notify server failure
            fi
          else
            echo "--- server: no changes"
          fi

          # servicectl — per-service integration test runner
          if echo "$CHANGED" | grep -qE '^(cmd/servicectl/|tests/integration/|go\.(mod|sum)$)'; then
            echo "==> Installing servicectl"
            if go install ./cmd/servicectl; then
              notify servicectl success
            else
              notify servicectl failure
            fi
          else
            echo "--- servicectl: no changes"
          fi

          # wstr — workstream lifecycle CLI
          # Cross-compile for darwin/amd64 (host OS). The runner is linux/amd64 inside
          # Docker, but /root/go is bind-mounted to /Users/jredh/go on the macOS host.
          # Plain `go install` would write a Linux binary there, which is unusable on
          # macOS. GOOS=darwin GOARCH=amd64 produces a native macOS binary instead.
          if echo "$CHANGED" | grep -qE '^(cmd/wstr/|go\.(mod|sum)$)'; then
            echo "==> Installing wstr (darwin/amd64 cross-compile)"
            if GOOS=darwin GOARCH=amd64 go build -o /root/go/bin/wstr ./cmd/wstr; then
              notify wstr success
            else
              notify wstr failure
            fi
          else
            echo "--- wstr: no changes"
          fi
