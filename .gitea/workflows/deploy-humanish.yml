# Auto-deploy humanish service on push to main.
# Rebuilds the Docker image and restarts the container.
name: Deploy Humanish

on:
  push:
    branches: [main]
    paths:
      - 'services/humanish/**'
      - 'go.mod'
      - 'go.sum'

jobs:
  deploy:
    runs-on: local
    steps:
      - uses: actions/checkout@v4

      - name: Build and restart humanish
        working-directory: /agentic
        run: |
          echo "==> Building humanish Docker image"
          docker compose build humanish
          echo "==> Restarting humanish service"
          docker compose up -d humanish
          echo "==> Waiting for startup"
          sleep 5
          docker compose ps humanish

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          STATUS="${{ job.status }}"
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"humanish deploy: $STATUS\"}" || true
