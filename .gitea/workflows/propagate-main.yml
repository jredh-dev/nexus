# Propagate Gitea main to GitHub.
#
# Flow:
#   1. Push to GitHub `rc` branch (not main — protected by status checks).
#   2. GitHub Actions picks up `rc`, runs CI, then fast-forward merges to
#      `main` and opens a PR against the current versioned RC branch
#      (.github/workflows/promote-rc.yml).
#
# Runs on every push to Gitea main (squash-merges from workstream branches).
name: Propagate Main to GitHub

on:
  push:
    branches: [main]

jobs:
  propagate:
    name: Push to GitHub rc
    runs-on: local
    env:
      GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitHub rc
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          git push --force \
            "https://${GITHUB_TOKEN}@github.com/jredh-dev/nexus.git" \
            "HEAD:refs/heads/rc"

  notify-failure:
    name: Notify Discord on Failure
    runs-on: local
    needs: [propagate]
    if: failure()
    steps:
      - name: Discord notification
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          ctl notify discord \
            --event build \
            --service nexus \
            --status failure \
            --message "main propagation to GitHub failed"
