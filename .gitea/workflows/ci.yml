name: CI

# Trigger on push to any branch except main and rc/* (those have dedicated workflows).
on:
  push:
    branches-ignore:
      - main
      - "rc/*"

jobs:
  lint:
    name: Lint
    runs-on: local
    steps:
      - uses: actions/checkout@v4

      - name: go vet
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          go vet ./...

      - name: gofmt check
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

  build:
    name: Build
    runs-on: local
    steps:
      - uses: actions/checkout@v4

      - name: go build
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          go build ./...

  test:
    name: Test
    runs-on: local
    steps:
      - uses: actions/checkout@v4

      - name: go test
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          go test ./...

  propagate:
    name: Propagate to GitHub
    runs-on: local
    needs: [lint, build, test]
    if: success()
    env:
      # Use GH_ACCESS_TOKEN — Gitea reserves the name GITHUB_TOKEN for its own token.
      GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive feat branch name
        id: branch
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          # Strip leading "workstream_" and replace with "feat/"
          # e.g. workstream_foo-bar-abc123 -> feat/foo-bar-abc123
          raw="${GITHUB_REF_NAME}"
          feat_name="feat/${raw#workstream_}"
          echo "feat_branch=${feat_name}" >> $GITHUB_OUTPUT
          echo "Derived feat branch: ${feat_name}"

      - name: Push branch to GitHub
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          feat_branch="${{ steps.branch.outputs.feat_branch }}"
          git push \
            "https://${GITHUB_TOKEN}@github.com/jredh-dev/nexus.git" \
            "HEAD:refs/heads/${feat_branch}"

      - name: Determine base branch (latest RC or main)
        id: base
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          # Fetch all branches from GitHub, filter rc/v*, sort descending, take first.
          # Use grep -F || true to avoid non-zero exit when no RC branches exist yet.
          base=$(curl -s \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/jredh-dev/nexus/branches?per_page=100" \
            | grep '"name"' \
            | grep '"rc/v' || true \
            | sed 's/.*"name": "\(.*\)".*/\1/' \
            | sort -rV \
            | head -1)
          if [ -z "$base" ]; then
            base="main"
          fi
          echo "base_branch=${base}" >> $GITHUB_OUTPUT
          echo "Using base branch: ${base}"

      - name: Build PR title from branch name
        id: pr_meta
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          feat_branch="${{ steps.branch.outputs.feat_branch }}"
          # Strip "feat/" prefix, trim trailing short hash, replace hyphens with spaces
          title="${feat_branch#feat/}"
          title=$(echo "$title" | sed 's/-[0-9a-f]\{6,8\}$//')
          title=$(echo "$title" | tr '-' ' ')
          echo "pr_title=${title}" >> $GITHUB_OUTPUT

      - name: Open GitHub PR
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          feat_branch="${{ steps.branch.outputs.feat_branch }}"
          base_branch="${{ steps.base.outputs.base_branch }}"
          pr_title="${{ steps.pr_meta.outputs.pr_title }}"
          gitea_ref="${GITHUB_REF_NAME}"

          # 422 = PR already exists; treat as success
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/jredh-dev/nexus/pulls" \
            -d "{
              \"title\": \"${pr_title}\",
              \"head\": \"${feat_branch}\",
              \"base\": \"${base_branch}\",
              \"body\": \"Propagated from Gitea CI. Branch: \`${gitea_ref}\`\"
            }" || true

      - name: Ensure RC→main PR exists on GitHub
        # If the base branch is an rc/* branch, make sure there is an open
        # PR targeting main so the release workflow can fire on merge.
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          rc_branch="${{ steps.base.outputs.base_branch }}"

          # Only act when the base is an RC branch (not main itself).
          if [[ "$rc_branch" != rc/v* ]]; then
            echo "Base branch is '${rc_branch}', not an RC branch — skipping."
            exit 0
          fi

          # Count open PRs from rc_branch → main.
          existing=$(curl -sf \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/jredh-dev/nexus/pulls?state=open&base=main&head=jredh-dev:${rc_branch}" \
            | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")

          if [ "$existing" -eq 0 ]; then
            echo "No open RC→main PR found. Creating ${rc_branch} → main..."
            http_code=$(curl -s -o /tmp/pr_response.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/jredh-dev/nexus/pulls" \
              -d "{
                \"title\": \"${rc_branch} \u2192 main\",
                \"head\": \"${rc_branch}\",
                \"base\": \"main\",
                \"body\": \"Release candidate. Merge to trigger versioned release and deploy.\"
              }")
            if [ "$http_code" -eq 201 ] || [ "$http_code" -eq 422 ]; then
              echo "RC→main PR created (or already existed): HTTP $http_code"
            else
              echo "Unexpected response creating RC→main PR: HTTP $http_code"
              cat /tmp/pr_response.json
              exit 1
            fi
          else
            echo "RC→main PR already exists for ${rc_branch} — skipping."
          fi

  notify-failure:
    name: Notify Discord on Failure
    runs-on: local
    needs: [lint, build, test]
    if: failure()
    steps:
      - name: Discord notification
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          ctl notify discord \
            --event build \
            --service nexus \
            --status failure
