name: CI

# Trigger on push to any branch except main and rc/* (those have dedicated workflows).
on:
  push:
    branches-ignore:
      - main
      - "rc/*"

jobs:
  lint:
    name: Lint
    runs-on: local
    steps:
      - uses: actions/checkout@v4

      - name: go vet
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          go vet ./...

      - name: gofmt check
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

  build:
    name: Build
    runs-on: local
    steps:
      - uses: actions/checkout@v4

      - name: go build
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          go build ./...

  test:
    name: Test
    runs-on: local
    steps:
      - uses: actions/checkout@v4

      - name: go test
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          go test ./...

  propagate:
    name: Propagate to GitHub
    runs-on: local
    needs: [lint, build, test]
    # Run on both success and failure so we can post the commit status either way.
    if: always()
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive feat branch name
        id: branch
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          # Strip leading "workstream_" and replace with "feat/"
          # e.g. workstream_foo-bar-abc123 -> feat/foo-bar-abc123
          raw="${GITHUB_REF_NAME}"
          feat_name="feat/${raw#workstream_}"
          echo "feat_branch=${feat_name}" >> $GITHUB_OUTPUT
          echo "Derived feat branch: ${feat_name}"

      - name: Determine CI outcome
        id: ci_outcome
        run: |
          # needs context: success only if all three passed
          lint="${{ needs.lint.result }}"
          build="${{ needs.build.result }}"
          test="${{ needs.test.result }}"
          if [ "$lint" = "success" ] && [ "$build" = "success" ] && [ "$test" = "success" ]; then
            echo "state=success" >> $GITHUB_OUTPUT
            echo "description=lint + build + test passed" >> $GITHUB_OUTPUT
          else
            echo "state=failure" >> $GITHUB_OUTPUT
            echo "description=CI failed: lint=$lint build=$build test=$test" >> $GITHUB_OUTPUT
          fi

      - name: Post GitHub commit status
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          sha="${GITHUB_SHA}"
          state="${{ steps.ci_outcome.outputs.state }}"
          description="${{ steps.ci_outcome.outputs.description }}"
          feat_branch="${{ steps.branch.outputs.feat_branch }}"

          # Post commit status to GitHub — same SHA exists on both remotes
          http_code=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/jredh-dev/nexus/statuses/${sha}" \
            -d "{
              \"state\": \"${state}\",
              \"description\": \"${description}\",
              \"context\": \"gitea-ci\",
              \"target_url\": \"${GITEA_SERVER_URL:-http://localhost:3000}/jredhbot/nexus/actions/runs/${GITHUB_RUN_NUMBER}\"
            }")
          echo "GitHub status API response: ${http_code}"

      - name: Push branch to GitHub
        # Only push on success — no point propagating a broken branch
        if: ${{ needs.lint.result == 'success' && needs.build.result == 'success' && needs.test.result == 'success' }}
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          feat_branch="${{ steps.branch.outputs.feat_branch }}"
          git push \
            "https://${GITHUB_TOKEN}@github.com/jredh-dev/nexus.git" \
            "HEAD:refs/heads/${feat_branch}"

      - name: Determine base branch (latest RC or main)
        id: base
        if: ${{ needs.lint.result == 'success' && needs.build.result == 'success' && needs.test.result == 'success' }}
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          # Fetch all branches from GitHub, filter rc/v*, sort descending, take first
          base=$(curl -s \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/jredh-dev/nexus/branches?per_page=100" \
            | grep '"name"' \
            | grep '"rc/v' \
            | sed 's/.*"name": "\(.*\)".*/\1/' \
            | sort -rV \
            | head -1)
          if [ -z "$base" ]; then
            base="main"
          fi
          echo "base_branch=${base}" >> $GITHUB_OUTPUT
          echo "Using base branch: ${base}"

      - name: Build PR title from branch name
        id: pr_meta
        if: ${{ needs.lint.result == 'success' && needs.build.result == 'success' && needs.test.result == 'success' }}
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          feat_branch="${{ steps.branch.outputs.feat_branch }}"
          # Strip "feat/" prefix, trim trailing short hash, replace hyphens with spaces
          title="${feat_branch#feat/}"
          title=$(echo "$title" | sed 's/-[0-9a-f]\{6,8\}$//')
          title=$(echo "$title" | tr '-' ' ')
          echo "pr_title=${title}" >> $GITHUB_OUTPUT

      - name: Open GitHub PR
        if: ${{ needs.lint.result == 'success' && needs.build.result == 'success' && needs.test.result == 'success' }}
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          feat_branch="${{ steps.branch.outputs.feat_branch }}"
          base_branch="${{ steps.base.outputs.base_branch }}"
          pr_title="${{ steps.pr_meta.outputs.pr_title }}"
          gitea_ref="${GITHUB_REF_NAME}"

          # 422 = PR already exists; treat as success
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/jredh-dev/nexus/pulls" \
            -d "{
              \"title\": \"${pr_title}\",
              \"head\": \"${feat_branch}\",
              \"base\": \"${base_branch}\",
              \"body\": \"Propagated from Gitea CI. Branch: \`${gitea_ref}\`\"
            }" || true

  notify-failure:
    name: Notify Discord on Failure
    runs-on: local
    needs: [lint, build, test]
    if: failure()
    steps:
      - name: Discord notification
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          ctl notify discord \
            --event build \
            --service nexus \
            --status failure
