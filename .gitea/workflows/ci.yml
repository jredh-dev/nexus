name: CI

# Runs on workstream_* branches — the Gitea quality gate.
# On pass, pushes directly to the current rc/vX.Y.Z branch on GitHub.
# No feat/* branches. No GitHub PRs from CI. Human reviews rc/* → main on GitHub.
on:
  push:
    branches-ignore:
      - main
      - "rc/*"

jobs:
  lint:
    name: Lint
    runs-on: local
    steps:
      - uses: actions/checkout@v4

      - name: go vet
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          go vet ./...

      - name: gofmt check
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

  build:
    name: Build
    runs-on: local
    steps:
      - uses: actions/checkout@v4

      - name: go build
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          go build ./...

  test:
    name: Test
    runs-on: local
    steps:
      - uses: actions/checkout@v4

      - name: go test
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          go test ./...

  propagate:
    name: Propagate to GitHub rc/vX.Y.Z
    runs-on: local
    needs: [lint, build, test]
    if: success()
    env:
      GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine current RC branch
        id: rc
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          rc=$(curl -s \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/jredh-dev/nexus/branches?per_page=100" \
            | grep '"name"' \
            | grep '"rc/v' \
            | sed 's/.*"name": "\(.*\)".*/\1/' \
            | sort -rV \
            | head -1)
          if [ -z "$rc" ]; then
            echo "No rc/vX.Y.Z branch found on GitHub — cannot propagate"
            exit 1
          fi
          echo "rc_branch=${rc}" >> $GITHUB_OUTPUT
          echo "Pushing to: ${rc}"

      - name: Push to GitHub rc/vX.Y.Z
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          git push \
            "https://${GITHUB_TOKEN}@github.com/jredh-dev/nexus.git" \
            "HEAD:refs/heads/${{ steps.rc.outputs.rc_branch }}"

  notify-failure:
    name: Notify Discord on Failure
    runs-on: local
    needs: [lint, build, test]
    if: failure()
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Discord notification
        run: |
          # Notify via discord-mcp HTTP API if available; fall back to direct webhook curl.
          # discord-mcp is not yet deployed on the first CI run, so direct curl is the fallback.
          if curl -sf http://discord-mcp:8092/health >/dev/null 2>&1; then
            curl -sf -X POST "http://discord-mcp:8092/mcp" \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"notify_discord","arguments":{"event":"build","service":"nexus","status":"failure","env":"local"}}}' \
              2>/dev/null || true
          elif [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d '{"embeds":[{"title":"build nexus","description":"env: local | status: failure","color":15158332}]}' \
              2>/dev/null || true
          fi
