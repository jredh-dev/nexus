# Auto-deploy Docker services on push to main.
# Detects which services changed and only rebuilds those.
# Runs docker compose from the agentic workspace root.
name: Docker Deploy

on:
  push:
    branches: [main]

env:
  AGENTIC_ROOT: /Users/jredh/Development/agentic

jobs:
  deploy:
    runs-on: local
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Sync source checkout
        env:
          INTERNAL_GIT_TOKEN: ${{ secrets.INTERNAL_GIT_TOKEN }}
        run: |
          # Pull latest main into work/source so docker compose build context is current.
          # Use http://gitea:3000 (Docker internal hostname) — not localhost:3000,
          # which is unreachable from inside the runner container.
          git -C /Users/jredh/Development/agentic/work/source/jredh-dev/nexus \
            pull "http://jredhbot:${INTERNAL_GIT_TOKEN}@gitea:3000/jredh-dev/nexus.git" main --ff-only

      - name: Detect changes and deploy
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          export PATH="/usr/local/bin:$HOME/go/bin:$PATH"
          CHANGED=$(git diff --name-only HEAD~1 HEAD)

          notify() {
            local service=$1 status=$2
            # Post a Discord embed directly — no ctl dependency.
            if [ -n "${DISCORD_WEBHOOK_URL}" ]; then
              color=3066993   # green
              [ "$status" = "failure" ] && color=15158332  # red
              curl -s -X POST -H "Content-Type: application/json" \
                -d "{\"embeds\":[{\"title\":\"deploy · ${service} · ${status}\",\"color\":${color},\"description\":\"env: local\"}]}" \
                "${DISCORD_WEBHOOK_URL}" > /dev/null || true
            fi
          }

          # hermit — Rust gRPC server
          if echo "$CHANGED" | grep -qE '^services/rust-grpc/'; then
            echo "==> Rebuilding hermit"
            if docker compose -f "$AGENTIC_ROOT/docker-compose.yml" build hermit && \
               docker compose -f "$AGENTIC_ROOT/docker-compose.yml" up -d hermit; then
              notify hermit success
            else
              notify hermit failure
            fi
          else
            echo "--- hermit: no changes"
          fi

          # secrets — HTTP API
          if echo "$CHANGED" | grep -qE '^(services/secrets/|services/go-http/|go\.(mod|sum)$)'; then
            echo "==> Rebuilding secrets"
            if docker compose -f "$AGENTIC_ROOT/docker-compose.yml" build secrets && \
               docker compose -f "$AGENTIC_ROOT/docker-compose.yml" up -d secrets; then
              notify secrets success
            else
              notify secrets failure
            fi
          else
            echo "--- secrets: no changes"
          fi

          # portal — Web portal
          if echo "$CHANGED" | grep -qE '^(services/portal/|internal/|go\.(mod|sum)$)'; then
            echo "==> Rebuilding portal"
            if docker compose -f "$AGENTIC_ROOT/docker-compose.yml" build portal && \
               docker compose -f "$AGENTIC_ROOT/docker-compose.yml" up -d portal; then
              notify portal success
            else
              notify portal failure
            fi
          else
            echo "--- portal: no changes"
          fi

          # web — Web frontend
          if echo "$CHANGED" | grep -qE '^services/web/'; then
            echo "==> Rebuilding web"
            if docker compose -f "$AGENTIC_ROOT/docker-compose.yml" build web && \
               docker compose -f "$AGENTIC_ROOT/docker-compose.yml" up -d web; then
              notify web success
            else
              notify web failure
            fi
          else
            echo "--- web: no changes"
          fi

          # vn — Visual novel engine
          if echo "$CHANGED" | grep -qE '^(services/vn/|services/go-http/|go\.(mod|sum)$)'; then
            echo "==> Rebuilding vn"
            if docker compose -f "$AGENTIC_ROOT/docker-compose.yml" build vn && \
               docker compose -f "$AGENTIC_ROOT/docker-compose.yml" up -d vn; then
              notify vn success
            else
              notify vn failure
            fi
          else
            echo "--- vn: no changes"
          fi

          # matrix — Dev hub dashboard
          if echo "$CHANGED" | grep -qE '^(services/matrix/|services/go-http/|go\.(mod|sum)$)'; then
            echo "==> Rebuilding matrix"
            if docker compose -f "$AGENTIC_ROOT/docker-compose.yml" build matrix && \
               docker compose -f "$AGENTIC_ROOT/docker-compose.yml" up -d matrix; then
              notify matrix success
            else
              notify matrix failure
            fi
          else
            echo "--- matrix: no changes"
          fi
